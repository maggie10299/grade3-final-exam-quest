<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三年級期末模擬考 - 麥塊迷宮探險</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root{
    --grass:#5C9E31; --grass-dark:#447522;
    --dirt:#8B6239; --dirt-dark:#6B4A2B;
    --stone:#8A8A8A; --stone-dark:#6B6B6B;
    --wood:#9C6B3F; --wood-dark:#3D2817;
    --sand:#DECB95; --sand-dark:#C2A968;
    --obsidian:#1D1A2B; --obsidian-light:#2B2745;
    --gold:#E8B339; --redstone:#A8231F; --diamond:#4FC3D9;
    --emerald:#3DAE5C; --portal-purple:#7B3FB8;
    --paper:#F2E9D8;
    --pixel-font:'Press Start 2P','Noto Sans TC',sans-serif;
    --body-font:'Noto Sans TC',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    font-family:var(--body-font);
    background:var(--obsidian);
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
  }
  body{padding-bottom:24px;}

  .pixel-frame{
    border:4px solid var(--wood-dark);
    box-shadow:inset 3px 3px 0 rgba(255,255,255,.15), inset -3px -3px 0 rgba(0,0,0,.35);
    border-radius:2px;
  }

  /* ── HEADER ── */
  .header{
    background:linear-gradient(180deg,#3A6BA8 0%,#5C9E31 60%,#447522 100%);
    padding:18px 14px 20px;text-align:center;position:relative;
    border-bottom:5px solid var(--wood-dark);overflow:hidden;
  }
  .header::before{
    content:'';position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size:16px 16px;pointer-events:none;
  }
  .header h1{
    font-family:var(--pixel-font);font-size:14px;color:#fff;
    text-shadow:2px 2px 0 #2D5016,-1px -1px 0 #2D5016,1px -1px 0 #2D5016,-1px 1px 0 #2D5016;
    letter-spacing:1px;line-height:1.6;position:relative;z-index:1;
  }
  .header p{font-size:11px;color:#FFF9E0;margin-top:6px;font-weight:700;position:relative;z-index:1;}
  .header-disclaimer{font-size:9px!important;color:rgba(255,255,255,.65)!important;font-weight:400!important;margin-top:4px!important;}
  .sound-toggle{
    position:absolute;top:10px;right:10px;z-index:2;
    width:36px;height:36px;border:3px solid var(--wood-dark);border-radius:2px;
    background:rgba(0,0,0,.35);color:#fff;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 2px 2px 0 rgba(255,255,255,.15),inset -2px -2px 0 rgba(0,0,0,.3);
  }
  .sound-toggle:active{transform:translateY(1px);}

  .hidden{display:none!important;}

  /* ── SETUP SCREEN ── */
  .setup-wrap{padding:14px;max-width:480px;margin:0 auto;}
  .card{background:var(--paper);color:#3D2817;border-radius:4px;padding:22px 18px;margin-top:14px;}
  .setup-icon{font-size:42px;text-align:center;margin-bottom:8px;}
  .card h2{font-family:var(--pixel-font);font-size:13px;text-align:center;margin-bottom:10px;color:var(--wood-dark);line-height:1.7;}
  .card .sub{font-size:13px;color:#5C4A33;text-align:center;margin-bottom:18px;line-height:1.6;}
  .field-label{font-family:var(--pixel-font);font-size:9px;margin:16px 0 8px;color:var(--wood-dark);display:flex;align-items:center;gap:6px;}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{
    flex:1;min-width:56px;padding:11px 6px;border:3px solid var(--dirt-dark);
    background:var(--dirt);font-size:12px;font-weight:700;font-family:var(--body-font);
    cursor:pointer;color:#fff;text-align:center;border-radius:2px;
    box-shadow:inset 2px 2px 0 rgba(255,255,255,.2),inset -2px -2px 0 rgba(0,0,0,.3);
  }
  .pill:active{transform:translateY(1px);box-shadow:none;}
  .pill.active{background:var(--emerald);border-color:#2B7A42;}
  .player-name-list{display:flex;flex-direction:column;gap:9px;margin-top:8px;}
  .player-name-row{display:flex;align-items:center;gap:10px;}
  .player-token{
    width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:17px;border:3px solid var(--wood-dark);border-radius:2px;
    box-shadow:inset 2px 2px 0 rgba(255,255,255,.25),inset -2px -2px 0 rgba(0,0,0,.3);
  }
  .player-name-input{
    flex:1;padding:10px 12px;border:3px solid var(--dirt-dark);border-radius:2px;
    font-size:14px;font-family:var(--body-font);outline:none;background:#fff;
  }
  .player-name-input:focus{border-color:var(--emerald);}
  .btn-primary{
    width:100%;padding:15px;border:4px solid #2B7A42;border-radius:2px;
    background:var(--emerald);color:#fff;font-size:13px;font-weight:900;
    font-family:var(--pixel-font);cursor:pointer;letter-spacing:1px;margin-top:22px;
    box-shadow:inset 3px 3px 0 rgba(255,255,255,.25),inset -3px -3px 0 rgba(0,0,0,.3);
  }
  .btn-primary:active{transform:translateY(2px);box-shadow:none;}

  /* ── GAME LAYOUT: sidebar + maze ── */
  .game-wrap{
    display:flex;gap:10px;padding:10px;max-width:760px;margin:0 auto;
    align-items:flex-start;flex-wrap:wrap;
  }
  .scoreboard{
    flex:0 0 auto;
    width:150px;
    display:flex;flex-direction:column;gap:8px;
    background:var(--obsidian-light);
    border:4px solid var(--wood-dark);border-radius:2px;
    padding:10px;
    position:sticky; top:10px;
  }
  .scoreboard-title{
    font-family:var(--pixel-font);font-size:8px;color:var(--gold);
    text-align:center;margin-bottom:4px;letter-spacing:1px;
  }
  .player-card{
    background:#2B2745;border:2px solid #443D6B;border-radius:2px;
    padding:8px;font-size:11px;color:#fff;
  }
  .player-card.current{border-color:var(--gold);background:#3A3458;}
  .player-card .pc-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .player-card .tok{
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    font-size:12px;flex-shrink:0;border:2px solid rgba(255,255,255,.3);border-radius:2px;
  }
  .player-card .pname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-weight:700;}
  .player-card .hearts{color:var(--redstone);font-size:11px;letter-spacing:-1px;display:block;margin-bottom:2px;}
  .player-card .xp{color:var(--gold);font-weight:700;font-size:10px;display:block;}
  .player-card .turn-badge{
    display:none;font-family:var(--pixel-font);font-size:7px;color:var(--gold);
    margin-top:4px;text-align:center;
  }
  .player-card.current .turn-badge{display:block;}

  .progress-box{
    background:#2B2745;border:2px solid #443D6B;border-radius:2px;
    padding:8px;font-size:10px;color:#D4CFEA;text-align:center;line-height:1.6;
  }
  .progress-box strong{color:var(--gold);}

  /* ── Maze area ── */
  .maze-area{flex:1 1 320px;min-width:300px;}
  .turn-label{
    text-align:center;font-size:12px;font-weight:700;color:#D4CFEA;
    margin-bottom:8px;background:var(--obsidian-light);
    border:3px solid var(--wood-dark);border-radius:2px;padding:8px;
  }
  .turn-label strong{color:var(--gold);}

  .maze-wrap{
    background:var(--obsidian-light);border:4px solid var(--wood-dark);border-radius:2px;
    padding:8px;margin-bottom:10px;
  }
  .maze-grid{
    display:grid;
    gap:0;
    aspect-ratio:1/1;
    background:#0F0D17;
    position:relative;
  }
  .maze-cell{
    position:relative;
    background:#3A3458;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;
  }
  .maze-cell.floor-visited{background:#4A4470;}
  .maze-cell.wall-top{box-shadow:inset 0 3px 0 0 var(--wood-dark);}
  .maze-cell.wall-right{box-shadow:inset -3px 0 0 0 var(--wood-dark);}
  .maze-cell.wall-bottom{box-shadow:inset 0 -3px 0 0 var(--wood-dark);}
  .maze-cell.wall-left{box-shadow:inset 3px 0 0 0 var(--wood-dark);}
  /* combine multiple wall shadows via multiple box-shadow in JS inline style */
  .maze-cell .cell-icon{font-size:22px;filter:drop-shadow(1px 1px 0 rgba(0,0,0,.5));}
  .maze-cell .player-marker{
    position:absolute;font-size:26px;
    filter:drop-shadow(1px 1px 0 rgba(0,0,0,.6));
    transition:all .15s ease;
    z-index:5;
  }
  /* When multiple players share a cell, scale down slightly and offset so they don't fully overlap */
  .maze-cell .player-marker.multi{font-size:20px;}

  /* D-pad */
  .dpad-wrap{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:8px;}
  .dpad{
    display:grid;grid-template-columns:48px 48px 48px;grid-template-rows:48px 48px 48px;
    gap:4px;
  }
  .dpad-btn{
    border:3px solid var(--wood-dark);border-radius:4px;
    background:var(--dirt);color:#fff;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 2px 2px 0 rgba(255,255,255,.2),inset -2px -2px 0 rgba(0,0,0,.3);
  }
  .dpad-btn:active{transform:translateY(1px);box-shadow:none;}
  .dpad-btn:disabled{opacity:.3;cursor:default;}
  .dpad-empty{visibility:hidden;}
  .dpad-up{grid-column:2;grid-row:1;}
  .dpad-left{grid-column:1;grid-row:2;}
  .dpad-center{grid-column:2;grid-row:2;background:var(--obsidian-light);border-color:#443D6B;font-size:16px;}
  .dpad-right{grid-column:3;grid-row:2;}
  .dpad-down{grid-column:2;grid-row:3;}

  .legend{
    display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
    font-size:9px;color:#D4CFEA;margin-top:6px;
  }
  .legend span{display:flex;align-items:center;gap:3px;}

  /* ── Battle Modal ── */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(13,11,20,.75);
    display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;
  }
  .modal-card{
    background:var(--paper);color:#3D2817;border:5px solid var(--wood-dark);border-radius:2px;
    padding:22px 18px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;
    box-shadow:0 0 0 3px rgba(0,0,0,.4),0 12px 0 rgba(0,0,0,.3);
  }
  .modal-tag{
    display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:2px;
    font-size:11px;font-weight:900;color:#fff;margin-bottom:12px;font-family:var(--pixel-font);
    border:2px solid rgba(0,0,0,.25);
  }
  .modal-tag.type-chinese{background:var(--grass-dark);}
  .modal-tag.type-math{background:var(--stone-dark);}
  .modal-tag.type-science{background:var(--wood-dark);}
  .modal-tag.type-social{background:#A8862A;}
  .modal-q{font-size:16px;font-weight:700;line-height:1.7;margin-bottom:14px;color:#2D2014;}
  .modal-hint{
    font-size:13px;color:#5C4A33;background:#E8DCC0;border:2px solid #C2A968;border-radius:2px;
    padding:8px 12px;margin-bottom:14px;line-height:1.6;
  }
  .modal-options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .modal-opt{
    display:flex;align-items:center;gap:10px;padding:12px 14px;border:3px solid #C2A968;border-radius:2px;
    cursor:pointer;font-size:14px;font-weight:500;background:#fff;text-align:left;width:100%;
    font-family:var(--body-font);color:#2D2014;
  }
  .modal-opt:hover:not(:disabled){border-color:var(--emerald);background:#EEF7EF;}
  .modal-opt .ol{
    width:24px;height:24px;border-radius:2px;background:#E8DCC0;color:var(--wood-dark);
    font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;border:2px solid #C2A968;
  }
  .modal-opt.selected{border-color:var(--gold);background:#FFF6DE;}
  .modal-opt.selected .ol{background:var(--gold);color:#3D2817;}
  .modal-opt.correct{border-color:var(--emerald);background:#E2F5E6;}
  .modal-opt.correct .ol{background:var(--emerald);color:#fff;}
  .modal-opt.wrong{border-color:var(--redstone);background:#FBE5E3;}
  .modal-opt.wrong .ol{background:var(--redstone);color:#fff;}
  .modal-fill{
    width:100%;padding:12px 14px;border:3px solid #C2A968;border-radius:2px;
    font-size:15px;font-family:var(--body-font);outline:none;margin-bottom:14px;
    color:#2D2014;background:#fff;
  }
  .modal-fill:focus{border-color:var(--emerald);}
  .modal-fill.correct-input{border-color:var(--emerald);background:#E2F5E6;}
  .modal-fill.wrong-input{border-color:var(--redstone);background:#FBE5E3;}
  .modal-feedback{
    padding:12px 14px;border-radius:2px;font-size:14px;font-weight:500;line-height:1.6;
    margin-bottom:14px;border:2px solid;
  }
  .modal-feedback.ok{background:#E2F5E6;color:#1E6B33;border-color:#7FC796;}
  .modal-feedback.bad{background:#FBE5E3;color:#8A2420;border-color:#E2918C;}
  .modal-feedback.info{background:#E8DCC0;color:#3D2817;border-color:#C2A968;}
  .modal-teach{
    background:#FFF6DE;border:2px solid var(--gold);border-radius:2px;
    padding:12px 14px;margin-bottom:14px;font-size:13px;color:#5C4A1F;line-height:1.7;
  }
  .teach-label{
    display:block;font-family:var(--pixel-font);font-size:10px;
    color:#B8862A;margin-bottom:6px;letter-spacing:1px;
  }
  .modal-btn{
    width:100%;padding:13px;border:3px solid #2B7A42;border-radius:2px;
    font-size:14px;font-weight:700;font-family:var(--pixel-font);cursor:pointer;
    color:#fff;background:var(--emerald);
  }
  .modal-btn:active:not(:disabled){transform:translateY(2px);}
  .modal-btn:disabled{opacity:.4;cursor:default;}

  /* ── Result screen ── */
  .result-icon{font-size:48px;text-align:center;margin-bottom:8px;}
  .winner-name{
    text-align:center;font-family:var(--pixel-font);font-size:12px;
    margin-bottom:6px;color:var(--wood-dark);line-height:1.7;
  }
  .winner-sub{text-align:center;font-size:13px;color:#5C4A33;margin-bottom:20px;}
  .result-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .result-row{
    display:flex;align-items:center;gap:12px;background:#E8DCC0;
    border:2px solid #C2A968;border-radius:2px;padding:12px 14px;
  }
  .result-row.rank-1{background:#FFF1CC;border-color:var(--gold);}
  .result-row .rank{font-size:18px;width:24px;text-align:center;}
  .result-row .rtok{
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;border:2px solid var(--wood-dark);border-radius:2px;
  }
  .result-row .rname{flex:1;font-weight:700;font-size:14px;color:#2D2014;}
  .result-row .rstats{font-size:11px;color:#5C4A33;text-align:right;line-height:1.5;}
  .result-row .rstats strong{color:#2D2014;font-size:14px;}

  .footer-credit{text-align:center;font-size:11px;color:#7A6A8A;padding:18px 0 4px;}
  .footer-credit a{color:var(--gold);font-weight:700;text-decoration:none;}
  .footer-credit a:hover{text-decoration:underline;}

  /* ── Responsive: stack sidebar above maze on narrow screens ── */
  @media (max-width:620px){
    .game-wrap{flex-direction:column;}
    .scoreboard{
      width:100%;position:static;
      flex-direction:row;flex-wrap:wrap;gap:6px;
    }
    .player-card{flex:1 1 auto;min-width:120px;}
    .scoreboard-title{width:100%;}
    .progress-box{flex:1 1 100%;}
  }
  @media (max-width:380px){
    .dpad{grid-template-columns:42px 42px 42px;grid-template-rows:42px 42px 42px;}
    .dpad-btn{font-size:16px;}
  }
</style>
</head>
<body>

<div class="header">
  <button id="soundToggleBtn" class="sound-toggle" onclick="toggleSound()">🔊</button>
  <h1>⛏️ 期末考大冒險<br>麥塊迷宮探險</h1>
  <p>國語・數學・自然・社會｜全家輪流闖關</p>
  <p class="header-disclaimer">適用 2026 國小三年級程度練習・非正式考試範圍，僅供課後複習參考</p>
</div>

<!-- ══════ SETUP SCREEN ══════ -->
<div id="setupScreen" class="setup-wrap">
  <div class="card pixel-frame">
    <div class="setup-icon">🗺️</div>
    <h2>準備好<br>進入迷宮了嗎？</h2>
    <p class="sub">用方向鍵在迷宮裡探險，遇到怪物要答題打怪！<br>消滅所有怪物、找到寶箱就能通關！</p>

    <div class="field-label">👥 玩家人數</div>
    <div class="pill-row" id="playerCountPills">
      <button class="pill" data-val="1" onclick="setPlayerCount(1)">1人</button>
      <button class="pill" data-val="2" onclick="setPlayerCount(2)">2人</button>
      <button class="pill" data-val="3" onclick="setPlayerCount(3)">3人</button>
      <button class="pill" data-val="4" onclick="setPlayerCount(4)">4人</button>
    </div>

    <div class="field-label">✏️ 玩家名稱</div>
    <div class="player-name-list" id="playerNameList"></div>

    <button class="btn-primary" onclick="startGame()">進入迷宮 ▶</button>
  </div>
</div>

<!-- ══════ GAME SCREEN ══════ -->
<div id="gameScreen" class="game-wrap hidden">
  <div class="scoreboard pixel-frame" id="scoreboard">
    <div class="scoreboard-title">⚔️ 冒險者紀錄</div>
    <!-- player-card elements injected here -->
    <div class="progress-box" id="progressBox"></div>
  </div>

  <div class="maze-area">
    <div class="turn-label" id="turnLabel"></div>
    <div class="maze-wrap">
      <div class="maze-grid" id="mazeGrid"></div>
    </div>
    <div class="dpad-wrap">
      <div class="dpad">
        <button class="dpad-btn dpad-up" onclick="movePlayer(0,-1)">⬆️</button>
        <button class="dpad-btn dpad-left" onclick="movePlayer(-1,0)">⬅️</button>
        <div class="dpad-btn dpad-center">🧭</div>
        <button class="dpad-btn dpad-right" onclick="movePlayer(1,0)">➡️</button>
        <button class="dpad-btn dpad-down" onclick="movePlayer(0,1)">⬇️</button>
      </div>
    </div>
    <div class="legend">
      <span>🌱国語</span><span>⛏️數學</span><span>🪵自然</span><span>🏖️社會</span><span>📦寶箱(終點)</span>
    </div>
  </div>
</div>

<!-- ══════ RESULT SCREEN ══════ -->
<div id="resultScreen" class="setup-wrap hidden">
  <div class="card pixel-frame">
    <div class="result-icon">🏆</div>
    <div class="winner-name" id="winnerName"></div>
    <div class="winner-sub">恭喜完成迷宮大冒險！</div>
    <div class="result-list" id="resultList"></div>
    <button class="btn-primary" onclick="location.reload()">🔄 再玩一次</button>
  </div>
</div>

<div class="footer-credit">
  製作：<a href="https://www.instagram.com/hello.maggie" target="_blank" rel="noopener">@hello.maggie</a>
</div>

<!-- Battle Modal -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-card" id="modalCard"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  三年級期末模擬考 - 麥塊迷宮探險 Game Logic
// ═══════════════════════════════════════════════════

// ---------- Question banks (all multiple-choice, validated no duplicate options) ----------
const BANKS = {
chinese:[
  {type:'choice',question:'「美麗」的「麗」字，共有幾畫？',options:['17畫','18畫','19畫','20畫'],answer:2,explain:'「麗」字共19畫，可以拆成「丶丶丿一一一丨一一一丨フ一一一丨フ一」慢慢數，或用字典查筆畫確認。'},
  {type:'choice',question:'下列哪個詞語是「反義詞」組合？',options:['冷靜－鎮定','勤勞－懶惰','開心－快樂','美麗－漂亮'],answer:1,explain:'「勤勞」和「懶惰」意思完全相反，是反義詞；其他三組意思相近，屬於「同義詞」。'},
  {type:'choice',question:'「他跑得很___」，空格最適合填入哪個詞？',options:['快速','快樂','快捷','快活'],answer:0,explain:'形容跑步的速度要用「快速」，「快樂」「快活」是形容心情，「快捷」較常用於形容服務或方式。'},
  {type:'choice',question:'下列哪一個句子用了「比喻」的修辭法？',options:['天空很藍','彎彎的月亮像小船','風吹過來了','他跑步很快'],answer:1,explain:'「月亮像小船」用「像」把月亮比喻成小船，這就是比喻句；其他句子都只是平鋪直敘的描述。'},
  {type:'choice',question:'「ㄔㄨㄢ」是哪個字的注音？',options:['穿','傳','船','串'],answer:2,hint:'想想渡河用的交通工具',explain:'「船」的注音是ㄔㄨㄢˊ；「穿」是ㄔㄨㄢ但聲調不同，「傳」「串」的注音聲調也不同，要連聲調一起記。'},
  {type:'choice',question:'「日積月累」這個成語的意思是？',options:['每天都很開心','一點一點慢慢累積','今天比昨天多','日子過得很快'],answer:1,explain:'「日積月累」字面意思是「每天累積、每月增加」，用來形容長時間慢慢積累的過程。'},
  {type:'choice',question:'下列哪一個字是形聲字？',options:['日','月','明','江'],answer:3,hint:'形聲字由形旁和聲旁組成',explain:'「江」是「水」（形旁，表示跟水有關）加「工」（聲旁，表示讀音），是典型的形聲字；「日」「月」是象形字，「明」是會意字。'},
  {type:'choice',question:'「媽媽去___買菜。」空格應填哪裡？',options:['超市','學校','公園','圖書館'],answer:0,explain:'買菜通常會去「超市」或市場，「學校」「公園」「圖書館」都不是買菜的地方，從生活常識判斷即可。'},
  {type:'choice',question:'「ㄅㄆㄇㄈ」屬於注音符號中的哪一類？',options:['韻母','聲母','介母','結合韻'],answer:1,explain:'「ㄅㄆㄇㄈ」是發音的開頭子音，屬於「聲母」；「ㄚㄛㄜㄝ」這類才是「韻母」。'},
  {type:'choice',question:'「春眠不覺曉，___啼鳥」，空格應填入什麼？',options:['處處','到處','此時','春天'],answer:0,hint:'這是孟浩然《春曉》的詩句',explain:'這是唐代孟浩然《春曉》的名句：「春眠不覺曉，處處聞啼鳥」，「處處」是固定的詩句用字，建議直接背熟整首詩。'},
  {type:'choice',question:'「勤」的部首是下列哪一個？',options:['力','口','人','水'],answer:0,explain:'「勤」字右邊的「力」是部首，表示跟力氣、努力有關；查字典時部首查「力部」就能找到這個字。'},
  {type:'choice',question:'「一石二___」是常見的成語，空格應填入哪個字？',options:['鳥','鳥兒','鳳','雀'],answer:0,explain:'「一石二鳥」是固定成語，意思是丟一顆石頭打中兩隻鳥，比喻一個動作達成兩個目的，不能隨意替換用字。'},
  {type:'choice',question:'「他非常___心，把功課做得很好。」空格填入哪個詞最恰當？',options:['用','傷','安','放'],answer:0,explain:'「用心」表示專心、認真投入，符合句意；「傷心」「安心」「放心」放進句子裡意思都不通順。'},
  {type:'choice',question:'「月」字共有幾畫？',options:['3畫','4畫','5畫','6畫'],answer:1,explain:'「月」字寫起來是「丿冂二」，總共4畫，可以一筆一筆數，或寫的時候邊寫邊數會更清楚。'},
  {type:'choice',question:'「有志者，事___成」，空格應填入哪個字？',options:['竟','必','終','才'],answer:0,explain:'「有志者，事竟成」是固定俗語，意思是有決心的人最終一定能成功，「竟」表示「終究、最後」。'},
  {type:'choice',question:'「ㄐㄧㄠ」可能是哪個字的注音？',options:['交','米','安','可'],answer:0,explain:'「交」的注音正是ㄐㄧㄠ；「米」是ㄇㄧˇ、「安」是ㄢ、「可」是ㄎㄜˇ，平時可以多練習拼讀注音來熟悉這些字音。'},
  {type:'choice',question:'下列哪一組是「量詞」用法正確的？',options:['一隻椅子','一張狗','一頭飛機','一輛汽車'],answer:3,explain:'汽車要用「一輛」，椅子用「一張」，狗用「一隻」，飛機用「一架」。量詞要跟物品搭配，平時多觀察生活中的用法就能記住。'},
  {type:'choice',question:'「他小心翼翼地捧著花瓶」，「翼翼」是用來形容什麼？',options:['速度很快','非常謹慎小心','聲音很大','心情很開心'],answer:1,explain:'「小心翼翼」是固定詞語，形容做事非常謹慎、小心，常用來描述拿易碎物品或處理重要事情的態度。'},
  {type:'choice',question:'下列哪一個詞語使用了「疊字」？',options:['快樂','高興','亮晶晶','美麗'],answer:2,explain:'「亮晶晶」用「晶」字重複出現（疊字），可以增強描寫的效果；其他選項都沒有重複的字。'},
  {type:'choice',question:'寫信給長輩時，結尾敬語應該用哪一個？',options:['祝你順心','敬請鈞安','加油喔','再見啦'],answer:1,hint:'對長輩要用比較正式的敬語',explain:'寫信給長輩要用比較正式、有禮貌的敬語，「敬請鈞安」是傳統書信常用語；其他選項較口語，適合用在同輩朋友之間。'},
  {type:'choice',question:'「狐假___威」，空格應填入哪個字？',options:['虎','獅','狼','貓'],answer:0,hint:'這個成語跟一種兇猛的動物有關',explain:'「狐假虎威」是出自寓言故事的成語，講狐狸假借老虎的威風來嚇唬別的動物，比喻仗著別人的勢力欺壓他人。'},
  {type:'choice',question:'「小心___翼」，形容走路很謹慎，空格應填入哪個字？',options:['翼','心','慢','腳'],answer:0,explain:'這是成語「小心翼翼」，前後兩個字都是「翼」，整個詞語要一起記住，不能拆開替換。'},
],
math:[
  {type:'choice',question:'345 + 278 = ？',options:['613','623','633','643'],answer:1,explain:'直式計算：個位 5+8=13（進1），十位 4+7+1=12（進1），百位 3+2+1=6，結果是623。記得每次進位都要加到下一位。'},
  {type:'choice',question:'一個長方形的長是 8 公分，寬是 5 公分，周長是多少公分？',options:['26公分','30公分','40公分','13公分'],answer:0,explain:'長方形周長公式是「(長+寬)×2」，所以是 (8+5)×2 = 13×2 = 26 公分。'},
  {type:'choice',question:'7 × 8 = ？',options:['54','56','58','63'],answer:1,explain:'7的乘法口訣：7×8=56，可以用「7×7=49，再加7」的方式推算，或直接背熟九九乘法表。'},
  {type:'choice',question:'500 − 237 = ？',options:['253','263','273','283'],answer:1,explain:'直式減法：個位0−7不夠減，要從十位借1變成10−7=3；十位9（借走1後）−3=6；百位4−2=2，結果是263。'},
  {type:'choice',question:'1 公斤 = 幾公克？',options:['10公克','100公克','1000公克','10000公克'],answer:2,explain:'重量單位換算：1公斤=1000公克，就像1公升=1000毫升一樣，是常見的「千進位」單位。'},
  {type:'choice',question:'下午 3 點 15 分，再過 45 分鐘是幾點？',options:['下午3點45分','下午4點','下午4點15分','下午3點60分'],answer:1,explain:'15分+45分=60分=1小時，所以下午3點15分再過45分鐘剛好滿1小時，變成下午4點整。'},
  {type:'choice',question:'一箱有 24 顆蘋果，買了 3 箱，共有幾顆？',options:['27顆','62顆','72顆','81顆'],answer:2,explain:'這是乘法應用題：24×3=72，可以拆成20×3=60，再加4×3=12，60+12=72。'},
  {type:'choice',question:'36 ÷ 4 = ？',options:['7','8','9','10'],answer:2,explain:'可以用乘法反推：4×9=36，所以36÷4=9。除法和乘法是互逆的運算，遇到除法不熟練時可以用乘法驗證。'},
  {type:'choice',question:'下列哪個數最大？',options:['498','502','489','510'],answer:3,explain:'比較三位數大小先看百位：5XX 比 4XX 大，所以502和510都比498、489大；再比較502和510的十位，510較大。'},
  {type:'choice',question:'1 公尺 = ___ 公分，空格應填入多少？',options:['10','100','1000','10000'],answer:1,explain:'長度單位換算：1公尺=100公分，這是最基本的長度換算，跟1公尺=1000毫米也要分清楚不要搞混。'},
  {type:'choice',question:'三角形有幾個角？',options:['2個','3個','4個','5個'],answer:1,explain:'三角形顧名思義有「三」個角和三個邊，這是三角形最基本的定義特徵。'},
  {type:'choice',question:'9 × 6 = ？',options:['48','52','54','56'],answer:2,explain:'9的乘法口訣：9×6=54，也可以用「9×6 = 10×6 − 6 = 60−6 = 54」的方法快速算出來。'},
  {type:'choice',question:'400 + ___ = 650，空格應填入多少？',options:['200','250','300','350'],answer:1,explain:'這是「找未知數」的題目，可以用減法反推：650−400=250，所以空格應填250。'},
  {type:'choice',question:'1 小時 = ___ 分鐘，空格應填入多少？',options:['30','45','60','100'],answer:2,explain:'時間單位換算：1小時=60分鐘，這是固定的時間換算規則，要熟記起來，之後計算時間加減才不會出錯。'},
  {type:'choice',question:'一個正方形的邊長是 6 公分，周長是多少公分？',options:['12公分','18公分','24公分','36公分'],answer:2,explain:'正方形四邊長度相等，周長公式是「邊長×4」，所以是 6×4=24 公分。'},
  {type:'choice',question:'下列哪一個是「分數」1/4 的正確讀法？',options:['四分之一','一分之四','四一分','一四分'],answer:0,explain:'分數讀法是先讀分母再讀分子，1/4 要讀成「四分之一」，分母（4）代表平分成幾份，分子（1）代表取幾份。'},
  {type:'choice',question:'1 公升 = 幾毫升？',options:['10毫升','100毫升','1000毫升','10000毫升'],answer:2,explain:'容量單位換算：1公升=1000毫升，跟1公尺=1000毫米、1公斤=1000公克一樣，都是常見的「千進位」單位換算。'},
  {type:'choice',question:'比較 3/4 和 1/4 的大小，下列哪個正確？',options:['3/4 比較大','1/4 比較大','一樣大','無法比較'],answer:0,explain:'兩個分數分母相同（都是4），只要比較分子大小即可：3>1，所以3/4比1/4大。'},
  {type:'choice',question:'一個圓的圓心到圓周上任一點的距離叫做什麼？',options:['直徑','半徑','周長','面積'],answer:1,explain:'從圓心到圓周邊上任一點的距離叫「半徑」；如果是經過圓心、連接圓周兩端的線段則叫「直徑」（直徑=半徑×2）。'},
  {type:'choice',question:'下列哪一個角是「直角」？',options:['剛好90度的角','小於90度的角','大於90度的角','180度的角'],answer:0,explain:'直角剛好是90度，可以用三角板的直角邊來檢查；小於90度叫銳角，大於90度（但小於180度）叫鈍角，180度是一條直線。'},
  {type:'choice',question:'128 ÷ 4 = ？',options:['30','32','34','36'],answer:1,explain:'可以拆解計算：128=120+8，120÷4=30，8÷4=2，30+2=32。或直接用乘法驗證：4×32=128。'},
  {type:'choice',question:'1/2 + 1/4 = ？（化成最簡分數）',options:['1/4','2/4','3/4','1'],answer:2,explain:'分母不同要先通分：1/2 = 2/4，再加上 1/4，變成 2/4+1/4=3/4。分數加法要先確認分母一樣才能直接加分子。'},
  {type:'choice',question:'一個長方形長 10 公分、寬 4 公分，面積是多少平方公分？',options:['28','36','40','44'],answer:2,explain:'長方形面積公式是「長×寬」，所以是 10×4=40 平方公分。要注意面積跟周長公式不同，別搞混了。'},
],
science:[
  {type:'choice',question:'植物進行光合作用，主要需要什麼？',options:['水和陽光和二氧化碳','水和土壤和氮氣','陽光和氧氣和沙子','肥料和水和氫氣'],answer:0,explain:'光合作用是植物利用陽光，把水和二氧化碳轉變成養分（葡萄糖）和氧氣的過程，這三個要素缺一不可。'},
  {type:'choice',question:'下列哪一種動物是昆蟲？',options:['蜘蛛','蜻蜓','蜈蚣','螃蟹'],answer:1,hint:'昆蟲有6隻腳',explain:'蜻蜓有6隻腳、身體分頭胸腹三節，符合昆蟲的定義；蜘蛛有8隻腳屬於蜘蛛綱，螃蟹和蜈蚣的腳數也不符合昆蟲特徵。'},
  {type:'choice',question:'磁鐵的哪兩個極會互相吸引？',options:['N極和N極','S極和S極','N極和S極','都不會'],answer:2,explain:'磁鐵的規則是「同極相斥、異極相吸」，N極和S極是不同極性，所以會互相吸引；相同極性（N-N或S-S）則會互相排斥。'},
  {type:'choice',question:'水變成水蒸氣叫做什麼？',options:['凝固','蒸發','凝結','融化'],answer:1,explain:'液態水變成氣態水蒸氣的過程叫「蒸發」；反過來水蒸氣變回水滴叫「凝結」，水變冰叫「凝固」，冰變水叫「融化」。'},
  {type:'choice',question:'春天過後是哪個季節？',options:['秋天','冬天','夏天','又回春天'],answer:2,explain:'台灣四季的順序是春、夏、秋、冬，按照這個固定循環，春天之後接著就是夏天。'},
  {type:'choice',question:'下列哪一種不是植物的繁殖方式？',options:['種子','孢子','分裂','花粉'],answer:2,hint:'分裂是微生物的方式',explain:'「分裂」是單細胞生物（如細菌、酵母菌）的繁殖方式，植物主要靠種子、孢子或花粉授粉等方式來繁殖後代。'},
  {type:'choice',question:'我們用什麼器官呼吸？',options:['心臟','肺臟','胃','腎臟'],answer:1,explain:'人體呼吸主要靠「肺臟」進行氣體交換（吸入氧氣、排出二氧化碳）；心臟負責打血液循環，胃負責消化，腎臟負責過濾血液。'},
  {type:'choice',question:'雨水是從哪裡來的？',options:['海水直接噴出來','水蒸氣在高空冷卻凝結','山上的冰雪融化','工廠製造的'],answer:1,explain:'地表水分蒸發變成水蒸氣，上升到高空後遇冷凝結成小水滴聚集成雲，水滴變大後就降落成雨，這是水循環的一部分。'},
  {type:'choice',question:'昆蟲的身體分為幾個部分？',options:['2','3','4','6'],answer:1,hint:'頭、胸、腹',explain:'昆蟲身體分為「頭、胸、腹」三個部分，這是判斷昆蟲的重要特徵之一，再加上6隻腳和身體分節的特徵。'},
  {type:'choice',question:'磁鐵同極相斥、異極相吸，下列哪個說法正確？',options:['N極和S極會互相排斥','N極和N極會互相吸引','N極和S極會互相吸引','磁鐵之間沒有作用力'],answer:2,explain:'磁鐵的基本規則：相同極性（N-N、S-S）會互相排斥，不同極性（N-S）會互相吸引，這是磁鐵最重要的性質。'},
  {type:'choice',question:'水結成冰的現象叫做什麼？',options:['蒸發','凝結','凝固','融化'],answer:2,explain:'液態水在低溫下變成固態冰，這個過程叫「凝固」；反過來冰受熱變回水叫「融化」，要注意這兩個詞不要搞混。'},
  {type:'choice',question:'植物的根的主要功能是什麼？',options:['開花結果','固定植物、吸收水分','製造氧氣','吸引昆蟲'],answer:1,explain:'根的主要功能是把植物固定在土壤裡，並從土壤中吸收水分和養分；製造氧氣主要靠葉子的光合作用，開花結果是花和果實的功能。'},
  {type:'choice',question:'蝴蝶的一生經過：卵→___→蛹→成蟲，空格應填入什麼？',options:['幼蟲','成蟲','卵殼','繭'],answer:0,explain:'蝴蝶的生長過程（完全變態）是「卵→幼蟲（毛毛蟲）→蛹→成蟲」，幼蟲階段會不斷進食成長，之後才會化蛹。'},
  {type:'choice',question:'太陽從哪一邊升起？',options:['東邊','西邊','南邊','北邊'],answer:0,explain:'地球自轉的方向固定，使得太陽永遠從「東邊」升起、從「西邊」落下，這是判斷方向的重要生活常識。'},

let audioCtx = null;
let soundEnabled = true;
let bgmTimer = null;
let bgmStep = 0;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function beep(freq, duration, type='square', vol=0.15, delay=0){
  if(!soundEnabled) return;
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type; osc.frequency.value = freq; gain.gain.value = vol;
    osc.connect(gain); gain.connect(ctx.destination);
    const startAt = ctx.currentTime + delay;
    gain.gain.setValueAtTime(vol, startAt);
    gain.gain.exponentialRampToValueAtTime(0.001, startAt + duration);
    osc.start(startAt); osc.stop(startAt + duration);
  }catch(e){}
}

function sfxBump(){ beep(90, 0.08, 'sawtooth', 0.08, 0); }

const BGM_MELODY=[392,0,440,0,494,0,440,0,392,0,330,0,392,0,0,0,440,0,494,0,523,0,494,0,440,0,392,0,330,0,0,0];
const BGM_BASS=[196,0,0,0,196,0,0,0,165,0,0,0,196,0,0,0,220,0,0,0,220,0,0,0,196,0,0,0,165,0,0,0];
const BGM_STEP_TIME=0.18;
function startBGM(){
  if(!soundEnabled) return;
  stopBGM(); bgmStep=0;
  getAudioCtx();
  bgmTimer = setInterval(()=>{
    if(!soundEnabled) return;
    const note=BGM_MELODY[bgmStep%BGM_MELODY.length], bass=BGM_BASS[bgmStep%BGM_BASS.length];
    if(note) beep(note, BGM_STEP_TIME*0.85,'square',0.045,0);
    if(bass) beep(bass, BGM_STEP_TIME*0.9,'triangle',0.05,0);
    bgmStep++;
  }, BGM_STEP_TIME*1000);
}
function stopBGM(){ if(bgmTimer){clearInterval(bgmTimer); bgmTimer=null;} }
function toggleSound(){
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggleBtn');
  if(btn) btn.textContent = soundEnabled ? '🔊' : '🔇';
  if(soundEnabled){ getAudioCtx(); startBGM(); } else { stopBGM(); }
}

function unlockAudioOnce(){
  if(audioUnlocked) return;

  getAudioCtx();

}

// ---------- Maze generation (recursive backtracker, guaranteed solvable) ----------
function generateMaze(size){
  const cells = [];
  for(let r=0;r<size;r++){
    cells.push([]);
    for(let c=0;c<size;c++){
      cells[r].push({top:true,right:true,bottom:true,left:true,visited:false});
    }
  }
  function carve(r,c){
    cells[r][c].visited = true;
    const dirs = shuffle([
      {dr:-1,dc:0,wall:'top',opp:'bottom'},
      {dr:1,dc:0,wall:'bottom',opp:'top'},
      {dr:0,dc:-1,wall:'left',opp:'right'},
      {dr:0,dc:1,wall:'right',opp:'left'},
    ]);
    for(const d of dirs){
      const nr=r+d.dr, nc=c+d.dc;
      if(nr>=0&&nr<size&&nc>=0&&nc<size&&!cells[nr][nc].visited){
        cells[r][c][d.wall]=false;
        cells[nr][nc][d.opp]=false;
        carve(nr,nc);
      }
    }
  }
  carve(0,0);
  return cells;
}

function placeMonsters(size, count){
  const subjCycle = shuffle(['chinese','math','science','social']);
  const cells = [];
  const taken = new Set(['0,0', `${size-1},${size-1}`]); // avoid start & chest cell
  let attempts = 0;
  while(cells.length < count && attempts < 500){
    attempts++;
    const r = Math.floor(Math.random()*size);
    const c = Math.floor(Math.random()*size);
    const key = `${r},${c}`;
    if(taken.has(key)) continue;
    taken.add(key);
    const subject = subjCycle[cells.length % subjCycle.length];
    cells.push({r,c,subject,defeated:false});
  }
  return cells;
}

  let h = '';
  for(let i=0;i<MAX_HEARTS;i++) h += (i < p.hearts) ? '❤️' : '🖤';
  return h;
}

  html += players.map((p,i)=>`
    <div class="player-card ${i===currentPlayerIdx?'current':''}">
      <div class="pc-top">
        <div class="tok" style="background:${p.color}">${p.emoji}</div>
        <span class="pname">${p.name}</span>
      </div>
      <span class="hearts">${heartsDisplay(p)}</span>
      <span class="xp">⭐ ${p.xp} 經驗值</span>
      <div class="turn-badge">▶ 輪到我了！</div>
    </div>
  `).join('');
  html += `<div class="progress-box" id="progressBox">🗡️ 剩餘怪物：<strong>${remaining}</strong> / ${monsterCells.length}<br>📦 找到寶箱即可通關！</div>`;
  board.innerHTML = html;
}

function cellAt(r,c){
  if(r===chestCell.r && c===chestCell.c) return {type:'chest'};
  const m = monsterCells.find(m=>m.r===r && m.c===c && !m.defeated);
  if(m) return {type:'monster', subject:m.subject, monster:m};
  if(r===0 && c===0) return {type:'start'};
  return {type:'floor'};
}

  grid.style.gridTemplateRows = `repeat(${MAZE_SIZE}, 1fr)`;

  let html = '';
  for(let r=0;r<MAZE_SIZE;r++){
    for(let c=0;c<MAZE_SIZE;c++){
      const cell = maze[r][c];
      const shadows = [];
      if(cell.top) shadows.push('inset 0 3px 0 0 var(--wood-dark)');
      if(cell.right) shadows.push('inset -3px 0 0 0 var(--wood-dark)');
      if(cell.bottom) shadows.push('inset 0 -3px 0 0 var(--wood-dark)');
      if(cell.left) shadows.push('inset 3px 0 0 0 var(--wood-dark)');
      const info = cellAt(r,c);
      let icon = '';
      if(info.type==='chest') icon = '📦';
      else if(info.type==='monster') icon = MOB_BY_SUBJECT[info.subject].emoji;
      else if(info.type==='start') icon = '🛠️';

      const playersOnCell = players.filter(p => p.r===r && p.c===c);
      const offsets = [
        {top:'50%',left:'50%'},          // 1 player: centered
        {top:'35%',left:'35%'},          // 2 players: top-left / bottom-right
        {top:'65%',left:'65%'},
        {top:'30%',left:'70%'},          // 3rd: top-right
        {top:'70%',left:'30%'},          // 4th: bottom-left
      ];
      let playersHere = '';
      if(playersOnCell.length === 1){
        const p = playersOnCell[0];
        const pi = players.indexOf(p);
        playersHere = `<span class="player-marker" style="z-index:${pi+1};top:50%;left:50%;transform:translate(-50%,-50%);">${p.emoji}</span>`;
      } else if(playersOnCell.length > 1){
        playersHere = playersOnCell.map((p,idx)=>{
          const pi = players.indexOf(p);
          const off = idx===0 ? {top:'35%',left:'35%'} : idx===1 ? {top:'65%',left:'65%'} : idx===2 ? {top:'30%',left:'70%'} : {top:'70%',left:'30%'};
          return `<span class="player-marker multi" style="z-index:${pi+1};top:${off.top};left:${off.left};transform:translate(-50%,-50%);">${p.emoji}</span>`;
        }).join('');
      }

      html += `<div class="maze-cell" style="box-shadow:${shadows.join(',')||'none'}">
        ${icon ? `<span class="cell-icon">${icon}</span>` : ''}
        ${playersHere}
      </div>`;
    }
  }
  grid.innerHTML = html;
}

function updateTurnLabel(){
  const p = players[currentPlayerIdx];
  document.getElementById('turnLabel').innerHTML = `輪到 <strong style="color:${p.color}">${p.emoji} ${p.name}</strong> 探險！用方向鍵移動`;
}

// ---------- Movement ----------
function movePlayer(dc, dr){
  if(gameOver || inBattle) return;
  unlockAudioOnce();
  const p = players[currentPlayerIdx];
  const cell = maze[p.r][p.c];

  // check wall blocking
  let blocked = false;
  if(dr===-1 && cell.top) blocked = true;
  if(dr===1 && cell.bottom) blocked = true;
  if(dc===-1 && cell.left) blocked = true;
  if(dc===1 && cell.right) blocked = true;

  if(blocked){
    sfxBump();
    return;
  }

  const nr = p.r + dr;
  const nc = p.c + dc;
  if(nr<0||nr>=MAZE_SIZE||nc<0||nc>=MAZE_SIZE) return;

  sfxStep();
  p.r = nr; p.c = nc;
  renderMaze();
  setTimeout(()=> triggerCell(), 150);
}

function triggerCell(){
  inBattle = true;
  setDpadEnabled(false);
  const p = players[currentPlayerIdx];
  const info = cellAt(p.r, p.c);

  if(info.type === 'chest'){
    sfxChest();
    showModalSimple('📦','找到寶箱！','太棒了！這個寶箱裡裝滿了金幣和裝備！','info', ()=>{
      checkVictory(p);
    });
  } else if(info.type === 'monster'){
    showQuestionModal(info.monster);
  } else {
    inBattle = false;
    endTurn();
  }
}

// ---------- Battle Modal ----------
function showModalSimple(emoji, title, text, kind, onClose){
  const overlay = document.getElementById('modalOverlay');
  const card = document.getElementById('modalCard');
  card.innerHTML = `
    <div class="modal-tag" style="background:#6B6B6B;">${emoji} ${title}</div>
    <div class="modal-q">${text}</div>
    <button class="modal-btn" id="modalCloseBtn">繼續 →</button>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('modalCloseBtn').onclick = ()=>{
    overlay.classList.add('hidden');
    onClose && onClose();
  };
}

function getNextQuestion(subject){
  const bank = BANKS[subject];
  let used = usedQuestions[subject];
  if(used.length >= bank.length) used = [];
  const available = bank.filter((_,i)=> !used.includes(i));
  const pickIdx = bank.indexOf(available[Math.floor(Math.random()*available.length)]);
  usedQuestions[subject] = [...used, pickIdx];
  return bank[pickIdx];
}

function showQuestionModal(monster){
  const subject = monster.subject;
  const q = getNextQuestion(subject);
  const subjInfo = SUBJECT_TYPES.find(s=>s.id===subject);
  const mob = MOB_BY_SUBJECT[subject];
  const overlay = document.getElementById('modalOverlay');
  const card = document.getElementById('modalCard');

  let bodyHtml = '';
  if(q.type==='choice'){
    bodyHtml = `<div class="modal-options" id="modalOptions">` +
      q.options.map((opt,i)=>`<button class="modal-opt" data-i="${i}" onclick="selectModalOption(${i})"><span class="ol">${'ABCD'[i]}</span>${opt}</button>`).join('') +
      `</div>`;
  } else {
    bodyHtml = `<input type="text" class="modal-fill" id="modalFillInput" placeholder="請輸入答案" oninput="onModalFillInput()">`;
  }

  card.innerHTML = `
    <div class="modal-tag type-${subject}">${mob.emoji} ${mob.name}出現了！（${subjInfo.name}題）</div>
    <div class="modal-q">${q.question}</div>
    ${q.hint ? `<div class="modal-hint">💡 ${q.hint}</div>` : ''}
    ${bodyHtml}
    <button class="modal-btn" id="modalSubmitBtn" disabled onclick="submitModalAnswer()">⚔️ 攻擊（確認答案）</button>
  `;
  overlay.classList.remove('hidden');

  window.__currentModalQ = q;
  window.__currentModalSelected = null;
  window.__currentModalMonster = monster;
}

function selectModalOption(i){
  sfxClick();
  window.__currentModalSelected = i;
  document.querySelectorAll('#modalOptions .modal-opt').forEach((el,idx)=>{
    el.classList.toggle('selected', idx===i);
  });
  document.getElementById('modalSubmitBtn').disabled = false;
}
function onModalFillInput(){
  const v = document.getElementById('modalFillInput').value;
  window.__currentModalSelected = v;
  document.getElementById('modalSubmitBtn').disabled = !v.trim();
}

function isAnsCorrect(q, ans){
  if(q.type==='choice') return ans===q.answer;
  if(ans===null||ans===undefined) return false;
  const u = ans.toString().trim();
  return [q.answer, ...(q.accept||[])].some(a=>u===a.trim());
}

function submitModalAnswer(){
  const q = window.__currentModalQ;
  const ans = window.__currentModalSelected;
  const monster = window.__currentModalMonster;
  const ok = isAnsCorrect(q, ans);
  const p = players[currentPlayerIdx];

  if(ok){ p.correct++; p.xp += 10; sfxCorrect(); monster.defeated = true; }
  else{ p.wrong++; p.hearts = Math.max(0, p.hearts-1); sfxWrong(); }

  if(q.type==='choice'){
    document.querySelectorAll('#modalOptions .modal-opt').forEach((el,idx)=>{
      el.classList.remove('selected');
      if(idx===q.answer) el.classList.add('correct');
      else if(idx===ans) el.classList.add('wrong');
      el.onclick = null;
    });
  } else {
    const inp = document.getElementById('modalFillInput');
    inp.readOnly = true;
    inp.classList.add(ok ? 'correct-input' : 'wrong-input');
  }

  const fb = document.createElement('div');
  fb.className = 'modal-feedback ' + (ok?'ok':'bad');
  fb.innerHTML = ok
    ? '⚔️ 攻擊成功！怪物被消滅了，獲得 10 經驗值！'
    : `💥 攻擊失誤，被怪物反擊扣 1 顆愛心！正確答案是：<strong>${q.type==='choice'?q.options[q.answer]:q.answer}</strong>`;
  const submitBtn = document.getElementById('modalSubmitBtn');
  submitBtn.parentNode.insertBefore(fb, submitBtn);

  if(!ok && q.explain){
    const teach = document.createElement('div');
    teach.className = 'modal-teach';
    teach.innerHTML = `<span class="teach-label">📖 小教室</span>${q.explain}`;
    submitBtn.parentNode.insertBefore(teach, submitBtn);
  }

  submitBtn.textContent = '繼續探險 →';
  submitBtn.disabled = false;
  submitBtn.onclick = ()=>{
    document.getElementById('modalOverlay').classList.add('hidden');
    renderScoreboard();
    renderMaze();
    if(p.hearts <= 0){
      showModalSimple('💔', p.name+' 愛心歸零！','別擔心，怪物只是把你嚇跑，愛心會補滿，稍後繼續挑戰！','info', ()=>{
        p.hearts = MAX_HEARTS;
        renderScoreboard();
        endTurn();
      });
    } else {
      endTurn();
    }
  };
}

// ---------- Victory check ----------
function checkVictory(p){
  const remaining = monsterCells.filter(m=>!m.defeated).length;
  if(remaining === 0){
    gameOver = true;
    showResults();
  } else {
    showModalSimple('⚠️','寶箱被鎖住了！',`還有 ${remaining} 隻怪物潛伏在迷宮裡，必須先消滅所有怪物才能打開寶箱！`,'info', ()=>{
      endTurn();
    });
  }
}

// ---------- Turn management ----------
function endTurn(){
  inBattle = false;
  setDpadEnabled(true);
  if(gameOver) return;
  currentPlayerIdx = (currentPlayerIdx+1) % players.length;
  renderScoreboard();
  updateTurnLabel();
}

function setDpadEnabled(enabled){
  document.querySelectorAll('.dpad-btn:not(.dpad-center)').forEach(btn=>{
    btn.disabled = !enabled;
  });
}

// ---------- Results ----------
function showResults(){
  stopBGM();
  sfxVictory();
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');

  const ranked = players.slice().sort((a,b)=> b.xp - a.xp);

  document.getElementById('winnerName').textContent = `🎉 全員通關！最佳冒險者：${ranked[0].emoji} ${ranked[0].name}`;

  const medals = ['🥇','🥈','🥉','🏅'];
  document.getElementById('resultList').innerHTML = ranked.map((p,i)=>`
    <div class="result-row ${i===0?'rank-1':''}">
      <div class="rank">${medals[i]||''}</div>
      <div class="rtok" style="background:${p.color}">${p.emoji}</div>
      <div class="rname">${p.name}</div>
      <div class="rstats">⭐${p.xp} 經驗值<br><strong>⚔️${p.correct} 勝</strong> / 💥${p.wrong} 敗</div>
    </div>
  `).join('');
}

// ---------- Keyboard support (desktop convenience) ----------
document.addEventListener('keydown', (e)=>{
  if(document.getElementById('gameScreen').classList.contains('hidden')) return;
  if(!document.getElementById('modalOverlay').classList.contains('hidden')) return;
  if(e.key==='ArrowUp') movePlayer(0,-1);
  else if(e.key==='ArrowDown') movePlayer(0,1);
  else if(e.key==='ArrowLeft') movePlayer(-1,0);
  else if(e.key==='ArrowRight') movePlayer(1,0);
});

</script>
